<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM 代理服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            background: #0d0d0d;
            min-height: 100vh;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 60px 40px;
        }

        .header {
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #e0e0e0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            color: #606060;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .main-content {
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        .input-section {
            flex: 1;
        }

        .input-label {
            font-size: 11px;
            color: #606060;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .input-wrapper {
            display: flex;
            gap: 0;
        }

        .input-field {
            flex: 1;
            padding: 16px 20px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-right: none;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #404040;
        }

        .input-field::placeholder {
            color: #404040;
        }

        .btn {
            padding: 16px 32px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #c0c0c0;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.3s;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn:hover {
            background: #222;
            border-color: #444;
            color: #fff;
        }

        .btn:active {
            background: #0f0f0f;
            transform: translateY(1px);
        }

        .btn-primary {
            background: #1a1a1a;
            border-color: #3a3a3a;
        }

        .btn-primary:hover {
            background: #252525;
            border-color: #4a4a4a;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #1a1a1a;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            background: #333;
        }

        .status-indicator.success {
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
        }

        .status-indicator.error {
            background: #f87171;
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.4);
        }

        .status-indicator.warning {
            background: #fbbf24;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
        }

        .status-text {
            font-size: 11px;
            color: #505050;
            letter-spacing: 0.5px;
        }

        .config-info {
            margin-top: 16px;
            font-size: 11px;
            color: #404040;
        }

        .config-info span {
            color: #606060;
        }

        .test-result {
            margin-top: 24px;
            padding: 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            font-size: 12px;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .test-result.success {
            border-color: #1a3a1a;
            color: #8f8;
        }

        .test-result.error {
            border-color: #3a1a1a;
            color: #f88;
        }

        .info-section {
            margin-top: 32px;
            padding: 24px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }

        .info-title {
            font-size: 10px;
            color: #404040;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .info-content {
            font-size: 12px;
            color: #606060;
            line-height: 1.8;
        }

        .info-content code {
            background: #141414;
            padding: 2px 8px;
            border-radius: 2px;
            color: #808080;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LLM Proxy Service</h1>
            <p>API Request Forwarding Interface</p>
        </div>

        <div class="input-section">
            <label class="input-label">Test Message</label>
            <div class="input-wrapper">
                <input type="text" class="input-field" id="testMessage" placeholder="Enter test message..." value="你好，请回复"连接成功"">
                <button class="btn btn-primary" onclick="testConnection()">Test</button>
                <button class="btn" onclick="reloadConfig()">Reload</button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">Initializing...</span>
        </div>

        <div class="config-info">
            Config: <span id="configPath"></span>
        </div>

        <div id="testResult" class="test-result"></div>

        <div class="info-section">
            <div class="info-title">Configuration</div>
            <div class="info-content">
                Edit <code>.llm_settings.json</code> to configure API endpoint and credentials.
            </div>
        </div>
    </div>

    <script>
        const CONFIG_PATH = '../.llm_settings.json';

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                
                if (data.configured) {
                    updateStatus('Ready', 'success');
                } else {
                    updateStatus('Not configured: ' + data.error, 'error');
                }
            } catch (e) {
                updateStatus('Connection failed', 'error');
            }
        }

        async function reloadConfig() {
            try {
                await fetch('/api/config/reload', { method: 'POST' });
                await loadConfig();
                showTestResult('Configuration reloaded', true);
            } catch (e) {
                showTestResult('Reload failed: ' + e.message, false);
            }
        }

        async function testConnection() {
            const testMessage = document.getElementById('testMessage').value;

            updateStatus('Testing...', 'warning');
            showTestResult('Sending request...', false);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: testMessage || '你好' }]
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    const reply = data.choices?.[0]?.message?.content || 'No response';
                    showTestResult('[OK] Connection successful\n\nResponse: ' + reply, true);
                    updateStatus('Connected', 'success');
                } else {
                    throw new Error(data.error?.message || JSON.stringify(data));
                }
            } catch (error) {
                showTestResult('[ERROR] ' + error.message, false);
                updateStatus('Failed', 'error');
            }
        }

        function showTestResult(message, isSuccess) {
            const result = document.getElementById('testResult');
            result.style.display = 'block';
            result.textContent = message;
            result.className = 'test-result ' + (isSuccess ? 'success' : 'error');
        }

        function updateStatus(text, type) {
            document.getElementById('statusText').textContent = text;
            const indicator = document.getElementById('statusIndicator');
            indicator.className = 'status-indicator';
            if (type === 'error') indicator.classList.add('error');
            else if (type === 'warning') indicator.classList.add('warning');
            else if (type === 'success') indicator.classList.add('success');
        }

        document.getElementById('configPath').textContent = CONFIG_PATH;
        loadConfig();
    </script>
</body>
</html>
