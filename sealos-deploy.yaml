apiVersion: apps.sealos.io/v1
kind: App
metadata:
  name: design-evolution-archive
  annotations:
    description: "游戏设计演进研究工具 - Streamlit 应用"
spec:
  # 容器镜像（使用项目内的 Dockerfile 构建）
  image: python:3.11-slim

  # 使用 Dockerfile 中的 ENTRYPOINT 启动
  cmd: []

  # 端口配置
  ports:
    - containerPort: 8080
      protocol: TCP

  # 环境变量（LLM API Key 需要在这里配置）
  env:
    - name: OPENAI_API_KEY
      value: ""
    - name: LLM_PROVIDER
      value: "openai"
    - name: LLM_MODEL
      value: "gpt-4o-mini"
    - name: OPENROUTER_BASE_URL
      value: ""
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: STREAMLIT_SERVER_PORT
      value: "8080"

  # 持久化存储配置
  mounts:
    - name: app-data
      path: /data

  # 资源限制
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "250m"
      memory: 512Mi

  # 健康检查
  healthCheck:
    enabled: true
    port: 8080
    path: /

  # 副本数
  replicas: 1

  # 访问配置
  accessToken: ""
  ssl: false
  networkType: LoadBalancer
